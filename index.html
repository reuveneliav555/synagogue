<script>
const {useState,useEffect,useCallback,useRef}=React;

/* ============ CLOUD SYNC via JSONBin.io ============ */
const CLOUD_CONFIG_KEY = "synagogue-cloud-config";
const LOCAL_KEY = "synagogue-data-v3";
const defaultData={members:[],purchases:[],occasions:[],expenses:[],payments:[]};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fc=n=>"\u20AA"+Number(n||0).toLocaleString("he-IL",{minimumFractionDigits:0});

function getCloudConfig(){
  try{const r=localStorage.getItem(CLOUD_CONFIG_KEY);return r?JSON.parse(r):null}catch{return null}
}
function setCloudConfig(cfg){localStorage.setItem(CLOUD_CONFIG_KEY,JSON.stringify(cfg))}

async function cloudSave(data,cfg){
  if(!cfg?.binId||!cfg?.apiKey)return false;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`,{
      method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":cfg.apiKey},
      body:JSON.stringify(data)
    });
    return r.ok;
  }catch{return false}
}

async function cloudLoad(cfg){
  if(!cfg?.binId||!cfg?.apiKey)return null;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`,{
      headers:{"X-Master-Key":cfg.apiKey}
    });
    if(!r.ok)return null;
    const j=await r.json();
    return j.record||null;
  }catch{return null}
}

async function cloudCreate(apiKey, data){
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Private":"true","X-Bin-Name":"synagogue-data"},
      body:JSON.stringify(data)
    });
    if(!r.ok)return null;
    const j=await r.json();
    return j.metadata?.id||null;
  }catch{return null}
}

function localLoad(){try{const r=localStorage.getItem(LOCAL_KEY);return r?JSON.parse(r):{...defaultData}}catch{return{...defaultData}}}
function localSave(d){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(d))}catch{}}

/* ============ EXPORT ============ */
const TABS=[
  {id:"dashboard",label:"\u05E1\u05D9\u05DB\u05D5\u05DD",icon:"\u25C9"},
  {id:"members",label:"\u05D7\u05D1\u05E8\u05D9\u05DD",icon:"\u2630"},
  {id:"purchases",label:"\u05E8\u05DB\u05D9\u05E9\u05D5\u05EA",icon:"\u2726"},
  {id:"expenses",label:"\u05D4\u05D5\u05E6\u05D0\u05D5\u05EA",icon:"\u25CB"},
  {id:"occasions",label:"\u05DE\u05D5\u05E2\u05D3\u05D9\u05DD",icon:"\u25C6"},
];
const PRESET_OCCASIONS=["\u05E9\u05D1\u05EA","\u05E8\u05D0\u05E9 \u05D4\u05E9\u05E0\u05D4","\u05D9\u05D5\u05DD \u05DB\u05D9\u05E4\u05D5\u05E8","\u05E1\u05D5\u05DB\u05D5\u05EA","\u05E9\u05DE\u05D7\u05EA \u05EA\u05D5\u05E8\u05D4","\u05D7\u05E0\u05D5\u05DB\u05D4","\u05E4\u05D5\u05E8\u05D9\u05DD","\u05E4\u05E1\u05D7","\u05E9\u05D1\u05D5\u05E2\u05D5\u05EA","\u05D8\u05F3 \u05D1\u05D0\u05D1","\u05D1\u05E8 \u05DE\u05E6\u05D5\u05D5\u05D4","\u05D1\u05E8\u05D9\u05EA\u05D5\u05EA","\u05E9\u05D1\u05E2 \u05D1\u05E8\u05DB\u05D5\u05EA","\u05D4\u05D6\u05DB\u05E8\u05D4","\u05D0\u05D7\u05E8"];
const EXPENSE_CATEGORIES=["\u05D7\u05E9\u05DE\u05DC","\u05EA\u05D7\u05D6\u05D5\u05E7\u05D4","\u05E9\u05DB\u05E8 \u05E8\u05D1","\u05E0\u05D9\u05E7\u05D9\u05D5\u05DF","\u05E6\u05D3\u05E7\u05D4","\u05E7\u05D9\u05D3\u05D5\u05E9","\u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD","\u05D0\u05D7\u05E8"];

function exportToExcel(data,type){
  const BOM="\uFEFF";let csv="";
  const{members,purchases,occasions,expenses,payments}=data;
  const mn=id=>members.find(m=>m.id===id)?.name||"";
  const on=id=>occasions.find(o=>o.id===id)?.name||"";
  const gpa=pid=>(payments||[]).filter(p=>p.purchaseId===pid).reduce((s,p)=>s+p.amount,0);
  if(type==="purchases"){csv="\u05E9\u05DD,\u05DE\u05D5\u05E2\u05D3,\u05EA\u05D9\u05D0\u05D5\u05E8,\u05E1\u05DB\u05D5\u05DD,\u05E9\u05D5\u05DC\u05DD,\u05D9\u05EA\u05E8\u05D4,\u05DE\u05E6\u05D1,\u05EA\u05D0\u05E8\u05D9\u05DA\n";purchases.forEach(p=>{const pd=gpa(p.id);const bl=p.amount-pd;const st=bl<=0?"\u05E9\u05D5\u05DC\u05DD":pd>0?"\u05D7\u05DC\u05E7\u05D9":"\u05D7\u05D5\u05D1";csv+=`"${mn(p.memberId)}","${on(p.occasionId)}","${p.description||""}",${p.amount},${pd},${bl},"${st}","${p.date||""}"\n`})}
  else if(type==="members"){csv="\u05E9\u05DD,\u05D8\u05DC\u05E4\u05D5\u05DF,\u05E1\u05D4\u05F4\u05DB,\u05E9\u05D5\u05DC\u05DD,\u05D9\u05EA\u05E8\u05D4\n";members.forEach(m=>{const mp=purchases.filter(p=>p.memberId===m.id);const t=mp.reduce((s,p)=>s+p.amount,0);const pd=mp.reduce((s,p)=>s+gpa(p.id),0);csv+=`"${m.name}","${m.phone||""}",${t},${pd},${t-pd}\n`})}
  else if(type==="expenses"){csv="\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4,\u05EA\u05D9\u05D0\u05D5\u05E8,\u05E1\u05DB\u05D5\u05DD,\u05EA\u05D0\u05E8\u05D9\u05DA\n";(expenses||[]).forEach(e=>{csv+=`"${e.category||""}","${e.description||""}",${e.amount},"${e.date||""}"\n`})}
  else if(type==="payments"){csv="\u05E9\u05DD \u05D7\u05D1\u05E8,\u05EA\u05D9\u05D0\u05D5\u05E8 \u05E8\u05DB\u05D9\u05E9\u05D4,\u05E1\u05DB\u05D5\u05DD \u05EA\u05E9\u05DC\u05D5\u05DD,\u05EA\u05D0\u05E8\u05D9\u05DA,\u05D4\u05E2\u05E8\u05D4\n";(payments||[]).forEach(pm=>{const pu=purchases.find(p=>p.id===pm.purchaseId);csv+=`"${pu?mn(pu.memberId):""}","${pu?.description||""}",${pm.amount},"${pm.date||""}","${pm.note||""}"\n`})}
  else if(type==="summary"){const tp=purchases.reduce((s,p)=>s+p.amount,0);const tpd=purchases.reduce((s,p)=>s+gpa(p.id),0);const te=(expenses||[]).reduce((s,e)=>s+e.amount,0);csv="\u05E1\u05D9\u05DB\u05D5\u05DD\n\n";csv+=`\u05E1\u05D4\u05F4\u05DB \u05E8\u05DB\u05D9\u05E9\u05D5\u05EA,${tp}\n\u05E9\u05D5\u05DC\u05DD,${tpd}\n\u05D7\u05D5\u05D1\u05D5\u05EA,${tp-tpd}\n\u05D4\u05D5\u05E6\u05D0\u05D5\u05EA,${te}\n\u05DE\u05D0\u05D6\u05DF,${tpd-te}\n`}
  const blob=new Blob([BOM+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
  const names={purchases:"\u05E8\u05DB\u05D9\u05E9\u05D5\u05EA",members:"\u05D7\u05D1\u05E8\u05D9\u05DD",expenses:"\u05D4\u05D5\u05E6\u05D0\u05D5\u05EA",payments:"\u05EA\u05E9\u05DC\u05D5\u05DE\u05D9\u05DD",summary:"\u05E1\u05D9\u05DB\u05D5\u05DD"};
  a.download=`\u05D1\u05D9\u05EA_\u05DB\u05E0\u05E1\u05EA_${names[type]||type}_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

/* ============ APP ============ */
function App(){
  const[data,setData]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[search,setSearch]=useState("");
  const[showAddMember,setShowAddMember]=useState(false);
  const[showAddPurchase,setShowAddPurchase]=useState(false);
  const[showAddOccasion,setShowAddOccasion]=useState(false);
  const[showAddExpense,setShowAddExpense]=useState(false);
  const[showPayment,setShowPayment]=useState(null);
  const[editingPurchase,setEditingPurchase]=useState(null);
  const[filterMember,setFilterMember]=useState("");
  const[filterOccasion,setFilterOccasion]=useState("");
  const[filterPaid,setFilterPaid]=useState("all");
  const[memberDetail,setMemberDetail]=useState(null);
  const[showExport,setShowExport]=useState(false);
  const[showCloudSetup,setShowCloudSetup]=useState(false);
  const[cloudCfg,setCloudCfg]=useState(null);
  const[syncStatus,setSyncStatus]=useState("local");
  const[lastSync,setLastSync]=useState(null);

  useEffect(()=>{
    const cfg=getCloudConfig();
    setCloudCfg(cfg);
    if(cfg?.binId&&cfg?.apiKey){
      setSyncStatus("loading");
      cloudLoad(cfg).then(d=>{
        if(d&&d.members){
          if(!d.payments)d.payments=[];if(!d.expenses)d.expenses=[];
          setData(d);localSave(d);setSyncStatus("synced");setLastSync(new Date());
        }else{
          const local=localLoad();setData(local);setSyncStatus("local");
        }
      });
    }else{
      setData(localLoad());
    }
  },[]);

  const persist=useCallback((updated)=>{
    setData(updated);localSave(updated);
    const cfg=getCloudConfig();
    if(cfg?.binId&&cfg?.apiKey){
      setSyncStatus("saving");
      cloudSave(updated,cfg).then(ok=>{
        setSyncStatus(ok?"synced":"error");
        if(ok)setLastSync(new Date());
      });
    }
  },[]);

  function doSync(){
    const cfg=getCloudConfig();
    if(!cfg?.binId||!cfg?.apiKey){setShowCloudSetup(true);return}
    setSyncStatus("loading");
    cloudLoad(cfg).then(d=>{
      if(d&&d.members){if(!d.payments)d.payments=[];if(!d.expenses)d.expenses=[];setData(d);localSave(d);setSyncStatus("synced");setLastSync(new Date())}
      else setSyncStatus("error");
    });
  }

  if(!data)return React.createElement("div",{style:{padding:40,textAlign:"center",color:"#8a8474"}},"\u05D8\u05D5\u05E2\u05DF...");
  const{members,purchases,occasions,expenses,payments}=data;

  function getPaidAmount(pid){return(payments||[]).filter(p=>p.purchaseId===pid).reduce((s,p)=>s+p.amount,0)}
  function getBalance(pid){const p=purchases.find(x=>x.id===pid);if(!p)return 0;const bal=p.amount-getPaidAmount(pid);return Math.max(0,bal)}
  function getStatus(pid){const p=purchases.find(x=>x.id===pid);if(!p)return"\u05D7\u05D5\u05D1";const paid=getPaidAmount(pid);if(paid>=p.amount)return"\u05E9\u05D5\u05DC\u05DD";if(paid>0)return"\u05D7\u05DC\u05E7\u05D9";return"\u05D7\u05D5\u05D1"}

  function getMemberStats(mid){
    const mp=purchases.filter(p=>p.memberId===mid);
    const total=mp.reduce((s,p)=>s+p.amount,0);
    const paid=mp.reduce((s,p)=>s+Math.min(p.amount,getPaidAmount(p.id)),0);
    const debt=total-paid;
    return{paid,debt:Math.max(0,debt),total,count:mp.length};
  }

  const totalPurchases=purchases.reduce((s,p)=>s+p.amount,0);
  const totalPaid=purchases.reduce((s,p)=>s+Math.min(p.amount,getPaidAmount(p.id)),0);
  const totalDebt=totalPurchases-totalPaid;
  const totalExpenses=(expenses||[]).reduce((s,e)=>s+e.amount,0);

  function addMember(name,phone){if(!name.trim())return;persist({...data,members:[...members,{id:gid(),name:name.trim(),phone:phone.trim(),createdAt:new Date().toISOString()}]});setShowAddMember(false)}
  function deleteMember(id){if(!confirm("\u05DC\u05DE\u05D7\u05D5\u05E7 \u05D0\u05EA \u05D4\u05D7\u05D1\u05E8 \u05D5\u05DB\u05DC \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD?"))return;const pids=purchases.filter(p=>p.memberId===id).map(p=>p.id);persist({...data,members:members.filter(m=>m.id!==id),purchases:purchases.filter(p=>p.memberId!==id),payments:(payments||[]).filter(p=>!pids.includes(p.purchaseId))});if(memberDetail===id)setMemberDetail(null)}
  function addOccasion(name){if(!name.trim()||occasions.find(o=>o.name===name.trim()))return;persist({...data,occasions:[...occasions,{id:gid(),name:name.trim()}]});setShowAddOccasion(false)}
  function deleteOccasion(id){if(!confirm("\u05DC\u05DE\u05D7\u05D5\u05E7?"))return;persist({...data,occasions:occasions.filter(o=>o.id!==id)})}
  function addPurchase(mid,oid,amount,desc,date){if(!mid||!amount)return;persist({...data,purchases:[...purchases,{id:gid(),memberId:mid,occasionId:oid||null,amount:Number(amount),description:desc.trim(),date:date||new Date().toISOString().slice(0,10),createdAt:new Date().toISOString()}]});setShowAddPurchase(false)}
  function deletePurchase(id){persist({...data,purchases:purchases.filter(p=>p.id!==id),payments:(payments||[]).filter(p=>p.purchaseId!==id)})}
  function updatePurchase(id,u){persist({...data,purchases:purchases.map(p=>p.id===id?{...p,...u}:p)});setEditingPurchase(null)}
  function addPayment(purchaseId,amount,date,note){
    const num=Number(amount);if(!num||num<=0)return;
    const bal=getBalance(purchaseId);
    const cappedAmount=Math.min(num,bal);
    if(cappedAmount<=0)return;
    persist({...data,payments:[...(payments||[]),{id:gid(),purchaseId,amount:cappedAmount,date:date||new Date().toISOString().slice(0,10),note:note||"",createdAt:new Date().toISOString()}]});
    setShowPayment(null);
  }
  function deletePayment(id){persist({...data,payments:(payments||[]).filter(p=>p.id!==id)})}
  function addExpense(cat,desc,amount,date){if(!amount)return;persist({...data,expenses:[...(expenses||[]),{id:gid(),category:cat,description:desc.trim(),amount:Number(amount),date:date||new Date().toISOString().slice(0,10),createdAt:new Date().toISOString()}]});setShowAddExpense(false)}
  function deleteExpense(id){persist({...data,expenses:(expenses||[]).filter(e=>e.id!==id)})}

  const filteredPurchases=purchases.filter(p=>!filterMember||p.memberId===filterMember).filter(p=>!filterOccasion||p.occasionId===filterOccasion).filter(p=>{if(filterPaid==="all")return true;const s=getStatus(p.id);if(filterPaid==="paid")return s==="\u05E9\u05D5\u05DC\u05DD";if(filterPaid==="partial")return s==="\u05D7\u05DC\u05E7\u05D9";return s==="\u05D7\u05D5\u05D1"}).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const mn=id=>members.find(m=>m.id===id)?.name||"\u2014";
  const on=id=>occasions.find(o=>o.id===id)?.name||"\u2014";

  const S={
    app:{maxWidth:900,margin:"0 auto",padding:"0 12px 80px"},
    header:{textAlign:"center",padding:"20px 0 4px"},
    title:{fontSize:22,fontWeight:700,letterSpacing:"-0.5px"},
    subtitle:{fontSize:11,color:"#8a8474",marginTop:2},
    tabs:{display:"flex",borderBottom:"1.5px solid #e8e4dc",marginBottom:14,marginTop:8,overflowX:"auto"},
    tab:a=>({flex:"0 0 auto",padding:"8px 11px",textAlign:"center",fontSize:12,fontWeight:a?600:400,color:a?"#2c2a25":"#8a8474",borderBottom:a?"2px solid #2c2a25":"2px solid transparent",cursor:"pointer",background:"none",border:"none",fontFamily:"inherit",whiteSpace:"nowrap"}),
    card:{background:"#fff",border:"1px solid #e8e4dc",borderRadius:10,padding:"12px 14px",marginBottom:8},
    statGrid:{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:8,marginBottom:14},
    stat:c=>({background:c==="green"?"#f0f7ee":c==="red"?"#fdf0ee":c==="blue"?"#eef4fb":"#f5f3ef",borderRadius:10,padding:"10px 12px",textAlign:"center"}),
    statLabel:c=>({fontSize:10,color:c==="green"?"#3b7a2d":c==="red"?"#b5412a":c==="blue"?"#2a5ea3":"#8a8474",marginBottom:2,fontWeight:500}),
    statValue:c=>({fontSize:18,fontWeight:700,color:c==="green"?"#2d6b1f":c==="red"?"#a33620":c==="blue"?"#1a4a8a":"#2c2a25"}),
    btn:{background:"#2c2a25",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"},
    btnSm:{background:"#2c2a25",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"},
    btnOutline:{background:"none",color:"#2c2a25",border:"1px solid #d4cfc5",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"},
    btnDanger:{background:"none",color:"#b5412a",border:"none",padding:"4px 8px",fontSize:11,cursor:"pointer",fontFamily:"inherit"},
    input:{width:"100%",padding:"8px 10px",border:"1px solid #d4cfc5",borderRadius:8,fontSize:14,fontFamily:"inherit",direction:"rtl",boxSizing:"border-box"},
    select:{width:"100%",padding:"8px 10px",border:"1px solid #d4cfc5",borderRadius:8,fontSize:14,fontFamily:"inherit",direction:"rtl",background:"#fff",boxSizing:"border-box"},
    label:{fontSize:11,fontWeight:600,color:"#5c584f",marginBottom:3,display:"block"},
    badge:s=>({display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:s==="\u05E9\u05D5\u05DC\u05DD"?"#e8f5e1":s==="\u05D7\u05DC\u05E7\u05D9"?"#fff3e0":"#fde8e4",color:s==="\u05E9\u05D5\u05DC\u05DD"?"#2d6b1f":s==="\u05D7\u05DC\u05E7\u05D9"?"#b8730a":"#a33620"}),
    overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:8},
    modal:{background:"#fff",borderRadius:14,padding:20,width:"100%",maxWidth:420,direction:"rtl",fontFamily:"'Heebo',sans-serif",maxHeight:"92vh",overflowY:"auto"},
    modalTitle:{fontSize:17,fontWeight:700,marginBottom:14},
    row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0ede6"},
    field:{marginBottom:10},
  };

  function Modal({show,onClose,title,children}){if(!show)return null;return React.createElement("div",{style:S.overlay,onClick:onClose},React.createElement("div",{className:"modal-inner",style:S.modal,onClick:e=>e.stopPropagation()},React.createElement("div",{style:S.modalTitle},title),children))}

  /* ---- Cloud Setup Modal ---- */
  function CloudSetupModal(){
    const[apiKey,setApiKey]=useState(cloudCfg?.apiKey||"");
    const[binId,setBinId]=useState(cloudCfg?.binId||"");
    const[status,setStatus]=useState("");
    const[step,setStep]=useState(cloudCfg?.binId?"connected":"start");

    async function handleConnect(){
      if(!apiKey.trim()){setStatus("\u05D4\u05DB\u05E0\u05E1 API Key");return}
      setStatus("\u05DE\u05EA\u05D7\u05D1\u05E8...");
      if(binId.trim()){
        const cfg={apiKey:apiKey.trim(),binId:binId.trim()};
        const d=await cloudLoad(cfg);
